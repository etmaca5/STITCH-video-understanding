name: ego4d_nlq
annotations_dir: /mnt/c/ego4d_data/v2/annotations
clips_dir: /mnt/c/ego4d_data/v2/clips
split: val

# Standard Ego4D NLQ evaluation protocol:
#   R@K at IoU=0.3 and IoU=0.5, for K=1 and K=5
#   mIoU (mean IoU of the top-1 prediction)
metrics:
  recall_at_k: [1, 5]
  iou_thresholds: [0.3, 0.5]
  compute_map: false
  map_iou_thresholds: []
  compute_miou: true
