name: qvhighlights
data_root: /mnt/c/qvhighlights_data
split: val

# Standard QVHighlights Moment Retrieval evaluation protocol:
#   R@1 at IoU=0.5, R@1 at IoU=0.7
#   MR-mAP at IoU=0.50:0.05:0.95
#   HL metrics (Hit@1 / mAP) at saliency thresholds
#   Also report mIoU (mean IoU of the top-1 prediction)
metrics:
  recall_at_k: [1]
  iou_thresholds: [0.5, 0.7]
  compute_map: true
  map_iou_thresholds: [0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95]
  compute_miou: true
  compute_highlight: true
  highlight_clip_length: 2.0
  highlight_min_scores: [2, 3, 4]

# QVHighlights reference eval typically keeps at most 10 windows per query.
max_pred_windows: 10
