provider: openrouter
base_url: "https://openrouter.ai/api/v1"
model: "qwen/qwen3-vl-8b-instruct"
site_url: null
site_name: "STITCH"
# OpenRouter route for this model may use a provider with a hard cap (e.g. Parasail: 30 images/request).
max_images_per_request: 30
# NOTE: temperature=0 does NOT guarantee deterministic outputs for Qwen models
# served via vLLM/OpenRouter. Floating-point ordering in quantized/parallel
# inference causes variability. Pass a fixed seed to the API if reproducibility
# is critical. See: vllm#17832, vllm#17759, QwenLM/Qwen2.5-VL#942.
temperature: 0.0
max_tokens: 32
