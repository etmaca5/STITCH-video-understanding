<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STITCH — Datasets &amp; Benchmarks</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f0f2f5; color: #333; }
  h1 { color: #1a1a2e; border-bottom: 3px solid #8b5cf6; padding-bottom: 10px; }
  h2 { color: #16213e; margin-top: 28px; border-left: 4px solid #8b5cf6; padding-left: 10px; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 24px; }
  th { background: #1a1a2e; color: white; padding: 10px 12px; text-align: left; font-size: 11px; text-transform: uppercase; white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid #eee; font-size: 13px; vertical-align: middle; }
  tr.data-row { cursor: pointer; }
  tr.data-row:hover td { background: #f3eeff; }
  tr.data-row.expanded td { background: #e5d5f5; }
  tr.detail-row { display: none; }
  tr.detail-row.open { display: table-row; }
  tr.detail-row td { padding: 0; border-bottom: 2px solid #8b5cf6; }
  .detail-panel { padding: 16px 20px; background: #faf5ff; display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; }
  .detail-block { }
  .detail-block.full { grid-column: 1 / -1; }
  .detail-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #888; margin-bottom: 3px; }
  .detail-value { font-size: 13px; color: #222; line-height: 1.5; }
  .detail-value.highlight { font-size: 14px; font-weight: 600; color: #1a1a2e; background: #fff8c4; border-left: 3px solid #f59e0b; padding: 6px 10px; border-radius: 0 4px 4px 0; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; }
  .badge-core { background: #d4edda; color: #155724; }
  .badge-supporting { background: #cce5ff; color: #004085; }
  .badge-peripheral { background: #fff3cd; color: #856404; }
  .badge-table { background: #ffe0b2; color: #7f3b00; }
  .yes { color: #28a745; font-weight: bold; }
  .no { color: #bbb; }
  .expand-icon { float: right; color: #aaa; font-size: 12px; transition: transform 0.2s; }
  tr.expanded .expand-icon { transform: rotate(180deg); color: #8b5cf6; }
</style>
</head>
<body>

<h1>Datasets &amp; Benchmarks</h1>
<p style="color:#666">16 dataset/benchmark papers (6 core, 6 supporting, 1 peripheral). Click any row to expand details.</p>

<div id="container"></div>

<script>
const DATASETS = [
  // CORE
  {id:"gebd",title:"Kinetics-GEBD: A Benchmark for Generic Event Boundary Detection",tier:"core",authors:"Shou et al.",venue:"ICCV 2021",task:"Generic Event Boundary Detection",lv:false,stitch_table:"Table 1",
   relation:"Kinetics-GEBD is our primary Table 1 GEBD benchmark. Defines the GEBD task: detect temporal boundaries between semantically distinct events in Kinetics videos. Also includes TAPOS (action phase segmentation).",
   notes:"Metrics: Rel.Dis. (relative displacement) and F1@0.05. The benchmark established GEBD as a standard task, making STITCH's training-free results directly comparable to all subsequent supervised methods."},
  {id:"qvhighlights",title:"QVHighlights: Detecting Moments and Highlights in Videos via Natural Language Queries",tier:"core",authors:"Lei et al.",venue:"NeurIPS 2021",task:"Moment retrieval + highlight detection",lv:false,stitch_table:"Table 2",
   relation:"QVHighlights is our primary Table 2 moment retrieval benchmark. 10K YouTube videos annotated for both moment localization (given a natural language query, find the temporal span) and highlight detection (rank clip quality).",
   notes:"Metrics: R1@0.5, R1@0.7, mAP for moments; HIT@1 for highlights. Both tasks evaluated simultaneously. Moment-DETR introduced as the baseline model alongside this dataset."},
  {id:"actnet_captions",title:"Dense-Captioning Events in Videos (ActivityNet Captions)",tier:"core",authors:"Krishna et al.",venue:"ICCV 2017",task:"Moment retrieval / dense captioning",lv:false,stitch_table:"Table 2",
   relation:"ActivityNet Captions provides the moment retrieval split used in STITCH Table 2. The original paper introduced dense event captioning; the moment retrieval evaluation split uses natural language queries to localize moments.",
   notes:"Metrics: R1@0.5, R1@0.7. Large-scale dataset (200 hours of video). The moment retrieval split is widely used and directly evaluable by STITCH."},
  {id:"videomme",title:"Video-MME: The First Comprehensive Evaluation Benchmark of Multi-modal LLMs in Video Analysis",tier:"core",authors:"Fu et al.",venue:"CVPR 2024",task:"Multi-modal LLM video QA",lv:true,stitch_table:"Table 3",
   relation:"Video-MME is one of our three Table 3 VLM reasoning benchmarks. Has short/medium/long splits. STITCH applied for frame selection on the long split, improving VLM performance.",
   notes:"Widely used MLLM benchmark. STITCH's improvement on the long split demonstrates the value of semantically-driven chunk-based frame selection over uniform sampling or learned compression."},
  {id:"mlvu",title:"MLVU: A Comprehensive Benchmark for Multi-Task Long Video Understanding",tier:"core",authors:"Zhou et al.",venue:"NeurIPS 2024",task:"Multi-task long video understanding",lv:true,stitch_table:"Table 3",
   relation:"MLVU is one of our Table 3 VLM reasoning benchmarks. Tests multiple long-video understanding subtasks (needle-in-a-haystack, video summarization, topic reasoning, etc.).",
   notes:"Covers videos of varying lengths across diverse subtasks. STITCH used as frame selector for downstream VLM. Comprehensive multi-task coverage."},
  {id:"longvideobench",title:"LongVideoBench: A Benchmark for Long-context Interleaved Video-Language Understanding",tier:"core",authors:"Wu et al.",venue:"NeurIPS 2024",task:"Long-context video-language QA",lv:true,stitch_table:"Table 3",
   relation:"LongVideoBench is our third Table 3 benchmark. Tests long-context interleaved video-language understanding using validation split.",
   notes:"Interleaved video-language format. Validation split used in STITCH results."},

  // SUPPORTING
  {id:"egoschema",title:"EgoSchema: A Diagnostic Benchmark for Very Long-form Video Language Understanding",tier:"supporting",authors:"Mangalam et al.",venue:"NeurIPS 2023",task:"Egocentric long-form video QA",lv:true,stitch_table:null,
   relation:"Long-form egocentric VQA benchmark. Related to STITCH's VLM reasoning evaluation tasks. 3-minute egocentric clips with multi-choice QA.",
   notes:"Not evaluated in STITCH but frequently co-cited with Video-MME and MLVU. Context for long video QA benchmarking landscape."},
  {id:"nextqa",title:"NExT-QA: NExT Phase of Question-Answering to Explaining Temporal Actions",tier:"supporting",authors:"Xiao et al.",venue:"CVPR 2021",task:"Causal/temporal video QA",lv:false,stitch_table:null,
   relation:"Video QA benchmark requiring causal and temporal reasoning. Adjacent to STITCH's VLM reasoning evaluation tasks.",
   notes:"Tests ability to explain temporal actions and causal relationships."},
  {id:"lovr",title:"LoVR: A Benchmark for Long Video Retrieval",tier:"supporting",authors:"Unknown",venue:"2024",task:"Long video text-to-video retrieval",lv:true,stitch_table:null,
   relation:"Long video retrieval benchmark. Adjacent to STITCH's moment retrieval + long video applications.",
   notes:"Evaluates text-to-video retrieval in long videos."},
  {id:"mad",title:"MAD: A Scalable Dataset for Language Grounding from Movie Audio Descriptions",tier:"supporting",authors:"Soldan et al.",venue:"CVPR 2022",task:"Movie-scale moment retrieval",lv:true,stitch_table:null,
   relation:"Large-scale movie-scale moment retrieval dataset. Adjacent to our Table 2 benchmarks. Potential future evaluation target for STITCH on very long videos.",
   notes:"Feature-length movie temporal grounding using audio description captions as queries. Tests grounding at movie scale (1-3 hours)."},
  {id:"momentseeker",title:"MomentSeeker: A Comprehensive Benchmark for Long Video Moment Retrieval",tier:"supporting",authors:"Unknown",venue:"2024",task:"Long video moment retrieval",lv:true,stitch_table:null,
   relation:"Comprehensive long video moment retrieval benchmark. Adjacent to STITCH's moment retrieval + long video setting.",
   notes:"Dense moment annotations in long videos. Covers diverse content types."},
  {id:"tapos",title:"TAPOS: Action Segmentation / Temporal Annotation of Procedural Activities",tier:"supporting",authors:"Shao et al.",venue:"CVPR 2020",task:"Action phase segmentation",lv:false,stitch_table:"Table 1",
   relation:"TAPOS is evaluated alongside Kinetics-GEBD in STITCH Table 1. Tests segmentation of procedural action phases.",
   notes:"Part of the GEBD benchmark family. Evaluates temporal segmentation of Olympic sports activities into distinct action phases."},

  // PERIPHERAL
  {id:"ego4d",title:"Ego4D: Around the World in 3,000 Hours of Egocentric Video",tier:"peripheral",authors:"Grauman et al.",venue:"CVPR 2022",task:"Multi-task egocentric (NLQ, MQ, etc.)",lv:true,stitch_table:null,
   relation:"Large egocentric video dataset with temporal grounding tasks (Natural Language Queries, Moment Queries). STITCH not evaluated here but Ego4D's scale and task diversity provide context.",
   notes:"3,000 hours of egocentric video. Multiple temporal tasks. STITCH's approach could in principle be applied here."},
];

function bool(v) { return v ? '<span class="yes">✓</span>' : '<span class="no">✗</span>'; }

function tierBadge(t) {
  const m = {core:"badge-core",supporting:"badge-supporting",peripheral:"badge-peripheral"};
  return `<span class="badge ${m[t]||''}">${t}</span>`;
}

function tableBadge(t) {
  if (!t) return '<span style="color:#aaa">—</span>';
  return `<span class="badge badge-table">${t}</span>`;
}

function toggleRow(rowId, detId) {
  const row = document.getElementById(rowId);
  const det = document.getElementById(detId);
  const isOpen = det.classList.contains('open');
  det.classList.toggle('open', !isOpen);
  row.classList.toggle('expanded', !isOpen);
}

function buildSection(title, papers, baseId) {
  if (!papers.length) return '';
  let html = `<h2>${title}</h2><table><thead><tr>
    <th style="width:30%">Title</th><th>Authors</th><th>Venue</th>
    <th>Task</th><th>Long Video</th><th>STITCH Table</th>
  </tr></thead><tbody>`;

  papers.forEach((p, i) => {
    const rowId = `${baseId}-r${i}`;
    const detId = `${baseId}-d${i}`;
    html += `<tr class="data-row" id="${rowId}" onclick="toggleRow('${rowId}','${detId}')">
      <td><strong>${p.title}</strong> <span class="expand-icon">▼</span></td>
      <td>${p.authors}</td><td>${p.venue}</td>
      <td style="font-size:12px">${p.task}</td>
      <td>${bool(p.lv)}</td>
      <td>${tableBadge(p.stitch_table)}</td>
    </tr>
    <tr class="detail-row" id="${detId}">
      <td colspan="6">
        <div class="detail-panel">
          <div class="detail-block full">
            <div class="detail-label">Relation to STITCH</div>
            <div class="detail-value highlight">${p.relation}</div>
          </div>
          <div class="detail-block full">
            <div class="detail-label">Notes</div>
            <div class="detail-value">${p.notes}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label">Tier</div>
            <div class="detail-value">${tierBadge(p.tier)}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label">STITCH Table</div>
            <div class="detail-value">${tableBadge(p.stitch_table)}</div>
          </div>
        </div>
      </td>
    </tr>`;
  });
  return html + '</tbody></table>';
}

const container = document.getElementById('container');
container.innerHTML = [
  buildSection('Core Benchmarks — Directly Evaluated in STITCH', DATASETS.filter(d=>d.tier==='core'), 'core'),
  buildSection('Supporting Benchmarks — Context & Comparison', DATASETS.filter(d=>d.tier==='supporting'), 'sup'),
  buildSection('Peripheral', DATASETS.filter(d=>d.tier==='peripheral'), 'peri'),
].join('');
</script>
</body>
</html>
