function rcBadge(rc) {
  if (!rc) return '<span style="color:#aaa;font-size:11px">—</span>';
  const map = {
    "compute_once_reuse": ["rc-once","compute once / reuse"],
    "reusable_repr_plus_scoring": ["rc-reuse","repr + per-query scoring"],
    "rerun_query_specific": ["rc-rerun","rerun per query"]
  };
  const [cls, label] = map[rc] || ["",""];
  return `<span class="rc-badge ${cls}">${label}</span>`;
}

function bool(v) { return v ? '<span class="yes">✓</span>' : '<span class="no">✗</span>'; }

function catBadge(c) {
  const map = {dataset_benchmark:"badge-dataset", method:"badge-method", other:"badge-other"};
  const label = {dataset_benchmark:"dataset", method:"method", other:"other"};
  return `<span class="badge ${map[c]||''}">${label[c]||c}</span>`;
}

function tierBadge(r) {
  const map = {core:"badge-core",supporting:"badge-supporting",peripheral:"badge-peripheral"};
  return `<span class="badge ${map[r]||''}">${r}</span>`;
}

function buildDetailPanel(p) {
  const flags = [
    [p.training_free, "training-free"],
    [p.zero_shot, "zero-shot"],
    [p.unsupervised, "unsupervised"],
    [p.supervised, "supervised"],
    [p.long_video, "long video"],
  ].map(([v,l]) => `<span class="flag ${v?'flag-yes':'flag-no'}">${v?'✓':'✗'} ${l}</span>`).join('');

  return `<div class="detail-panel">
    <div class="detail-block full">
      <div class="detail-label">Relation to STITCH</div>
      <div class="detail-value highlight">${p.relation}</div>
    </div>
    <div class="detail-block full">
      <div class="detail-label">Notes</div>
      <div class="detail-value">${p.notes}</div>
    </div>
    <div class="detail-block">
      <div class="detail-label">Properties</div>
      <div class="flags">${flags}</div>
    </div>
    <div class="detail-block">
      <div class="detail-label">Query Awareness</div>
      <div class="detail-value">${p.query_awareness}</div>
    </div>
    <div class="detail-block">
      <div class="detail-label">Temporal Unit</div>
      <div class="detail-value">${p.temporal_unit}</div>
    </div>
    <div class="detail-block">
      <div class="detail-label">Reusable Compute</div>
      <div class="detail-value">${rcBadge(p.reusable_compute)}</div>
    </div>
    <div class="detail-block full">
      <div class="detail-label">Filename</div>
      <div class="detail-value" style="font-family:monospace;font-size:11px;color:#888">${p.filename}</div>
    </div>
  </div>`;
}

function buildTable(papers, containerId, showTier) {
  const el = document.getElementById(containerId);
  if (!papers.length) { el.innerHTML = '<p style="color:#888">No papers in this category.</p>'; return; }

  let html = `<table><thead><tr>
    <th style="width:30%">Title</th>
    <th>Authors</th>
    <th>Venue</th>
    ${showTier ? '<th>Tier</th>' : ''}
    <th>Cat</th>
    <th>TF</th><th>ZS</th><th>UN</th>
    <th>QA</th><th>TU</th><th>LV</th>
    <th style="width:22%">Relation to STITCH</th>
  </tr></thead><tbody>`;

  let lastTier = null;
  papers.forEach((p, i) => {
    if (showTier && p.relevance !== lastTier) {
      const labels = {core:'— CORE —',supporting:'— SUPPORTING —',peripheral:'— PERIPHERAL —'};
      html += `<tr class="section-header"><td colspan="${showTier ? 12 : 11}">${labels[p.relevance]||p.relevance.toUpperCase()}</td></tr>`;
      lastTier = p.relevance;
    }
    const rowId = `row-${containerId}-${i}`;
    const detId = `det-${containerId}-${i}`;
    html += `<tr class="data-row" id="${rowId}" onclick="toggleRow('${rowId}','${detId}')">
      <td><strong>${p.title}</strong> <span class="expand-icon">▼</span></td>
      <td>${p.authors}</td>
      <td>${p.venue}</td>
      ${showTier ? `<td>${tierBadge(p.relevance)}</td>` : ''}
      <td>${catBadge(p.category)}</td>
      <td>${bool(p.training_free)}</td>
      <td>${bool(p.zero_shot)}</td>
      <td>${bool(p.unsupervised)}</td>
      <td style="white-space:nowrap">${p.query_awareness==='query-dependent'?'QD':p.query_awareness==='no-query'?'NQ':p.query_awareness==='query-potential'?'QP':p.query_awareness}</td>
      <td style="white-space:nowrap;font-size:11px">${p.temporal_unit}</td>
      <td>${bool(p.long_video)}</td>
      <td style="font-size:12px;color:#555">${p.relation}</td>
    </tr>
    <tr class="detail-row" id="${detId}">
      <td colspan="${showTier ? 12 : 11}">${buildDetailPanel(p)}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  el.innerHTML = html;
}

function buildDropTable() {
  let html = `<p><strong>7 papers dropped</strong> — no benchmark overlap, no method connection to STITCH. Click a row for drop rationale.</p>
  <table><thead><tr><th>Title</th><th>Filename</th><th>Venue</th><th>Drop Reason (summary)</th></tr></thead><tbody>`;
  DROPS.forEach((d, i) => {
    const rowId = `drow-${i}`;
    const detId = `ddet-${i}`;
    html += `<tr class="data-row" id="${rowId}" onclick="toggleRow('${rowId}','${detId}')">
      <td><strong>${d.title}</strong> <span class="expand-icon">▼</span></td>
      <td style="font-family:monospace;font-size:11px;color:#888">${d.filename}</td>
      <td>${d.venue}</td>
      <td style="font-size:12px;color:#555">${d.reason.substring(0,80)}${d.reason.length>80?'…':''}</td>
    </tr>
    <tr class="detail-row" id="${detId}">
      <td colspan="4">
        <div class="detail-panel single-col">
          <div class="detail-block">
            <div class="detail-label">Full Drop Reason</div>
            <div class="detail-value highlight">${d.reason}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label">Filename</div>
            <div class="detail-value" style="font-family:monospace;font-size:11px;color:#888">${d.filename}</div>
          </div>
        </div>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('table-drops').innerHTML = html;
}

function toggleRow(rowId, detId) {
  const row = document.getElementById(rowId);
  const det = document.getElementById(detId);
  const isOpen = det.classList.contains('open');
  det.classList.toggle('open', !isOpen);
  row.classList.toggle('expanded', !isOpen);
}

function showTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// Build tables
const retained = PAPERS.filter(p => ['core','supporting','peripheral'].includes(p.relevance));
const core = PAPERS.filter(p => p.relevance === 'core');
const supporting = PAPERS.filter(p => p.relevance === 'supporting');
const peripheral = PAPERS.filter(p => p.relevance === 'peripheral');

buildTable(retained, 'table-all', true);
buildTable(core, 'table-core', false);
buildTable(supporting, 'table-supporting', false);
buildTable(peripheral, 'table-peripheral', false);
buildDropTable();
</script>

</body>
</html>
