  {id:"videoxl",title:"Video-XL: Extra-Long Vision Language Model for Hour-Scale Video",tier:"peripheral",authors:"Unknown",venue:"2024",tf:false,zs:false,un:false,qa:"QD",tu:"window/clip",lv:true,rc:"compute_once_reuse",
   relation:"Extra-long VLM for hour-scale videos. Peripheral; different training-based approach.",
   notes:"Long-context VLM for hour-scale video."},
  {id:"your_interest",title:"Your Interest, Your Summaries: User-Query-Aware Video Summarization",tier:"peripheral",authors:"Unknown",venue:"2024",tf:false,zs:false,un:false,qa:"QD",tu:"window/clip",lv:false,rc:"rerun_query_specific",
   relation:"Query-aware video summarization. Peripheral to STITCH's unsupervised no-query chunking.",
   notes:"Supervised query-aware summarization."},
];

function bool(v) { return v ? '<span class="yes">✓</span>' : '<span class="no">✗</span>'; }

function rcBadge(rc) {
  if (!rc) return '<span style="color:#aaa">—</span>';
  const m = {compute_once_reuse:["rc-once","compute once / reuse"],reusable_repr_plus_scoring:["rc-reuse","repr + per-query scoring"],rerun_query_specific:["rc-rerun","rerun per query"]};
  const [c,l] = m[rc]||["","rc"];
  return `<span class="rc-badge ${c}">${l}</span>`;
}

function toggleRow(rowId, detId) {
  const row = document.getElementById(rowId);
  const det = document.getElementById(detId);
  const isOpen = det.classList.contains('open');
  det.classList.toggle('open', !isOpen);
  row.classList.toggle('expanded', !isOpen);
}

function buildSection(title, papers, baseId) {
  if (!papers.length) return '';
  let html = `<h2>${title} (${papers.length})</h2><table><thead><tr>
    <th style="width:28%">Title</th><th>Authors</th><th>Venue</th>
    <th>TF</th><th>ZS</th><th>UN</th><th>QA</th><th>TU</th><th>LV</th><th>RC</th>
    <th style="width:22%">Relation to STITCH</th>
  </tr></thead><tbody>`;

  papers.forEach((p, i) => {
    const rowId = `${baseId}-r${i}`;
    const detId = `${baseId}-d${i}`;
    html += `<tr class="data-row" id="${rowId}" onclick="toggleRow('${rowId}','${detId}')">
      <td><strong>${p.title}</strong> <span class="expand-icon">▼</span></td>
      <td>${p.authors}</td><td>${p.venue}</td>
      <td>${bool(p.tf)}</td><td>${bool(p.zs)}</td><td>${bool(p.un)}</td>
      <td style="white-space:nowrap">${p.qa}</td>
      <td style="white-space:nowrap;font-size:11px">${p.tu}</td>
      <td>${bool(p.lv)}</td>
      <td>${rcBadge(p.rc)}</td>
      <td style="font-size:12px;color:#555">${p.relation}</td>
    </tr>
    <tr class="detail-row" id="${detId}">
      <td colspan="11">
        <div class="detail-panel">
          <div class="detail-block full">
            <div class="detail-label">Relation to STITCH</div>
            <div class="detail-value highlight">${p.relation}</div>
          </div>
          <div class="detail-block full">
            <div class="detail-label">Notes</div>
            <div class="detail-value">${p.notes}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label">Properties</div>
            <div class="flags">
              ${[['training-free',p.tf],['zero-shot',p.zs],['unsupervised',p.un],['long video',p.lv]].map(([l,v])=>`<span class="flag ${v?'flag-yes':'flag-no'}">${v?'✓':'✗'} ${l}</span>`).join('')}
            </div>
          </div>
          <div class="detail-block">
            <div class="detail-label">Reusable Compute</div>
            <div class="detail-value">${rcBadge(p.rc)}</div>
          </div>
        </div>
      </td>
    </tr>`;
  });
  return html + '</tbody></table>';
}

const container = document.getElementById('container');
const groups = [
  ['Core Methods', METHODS.filter(m => m.tier === 'core'), 'core'],
  ['Supporting — Training-free / Zero-shot', METHODS.filter(m => m.tier==='supporting' && (m.tf||m.zs||m.un) && !['longvu','moviechat','adavideorag','lvc','storm','lvlr','chapter_llama','tridet','boundary_ssl','shot_relating'].includes(m.id)), 'sup-tf'],
  ['Supporting — Supervised Moment Retrieval & Grounding', METHODS.filter(m => m.tier==='supporting' && !m.tf && !m.zs && !m.un && !m.lv && !['tridet','boundary_ssl','shot_relating'].includes(m.id)), 'sup-sup'],
  ['Supporting — Long Video & VLM Frame Selection', METHODS.filter(m => m.tier==='supporting' && m.lv && !m.tf && !m.zs), 'sup-lv'],
  ['Supporting — Temporal Action Detection & Scene Segmentation', METHODS.filter(m => ['tridet','boundary_ssl','shot_relating'].includes(m.id)), 'sup-tad'],
  ['Peripheral', METHODS.filter(m => m.tier === 'peripheral'), 'peri'],
];

container.innerHTML = groups.map(([title, papers, id]) => buildSection(title, papers, id)).join('');
</script>
</body>
</html>
